name: ZTLP CI

on:
  push:
    branches: [main, prototype-docs]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  MIX_ENV: test
  ELIXIR_VERSION: '1.15'
  OTP_VERSION: '26'
  RUST_TOOLCHAIN: stable
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Rust: library tests + clippy + format ─────────────────────
  rust:
    name: Rust (proto)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proto
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            proto/target/
          key: cargo-${{ runner.os }}-${{ hashFiles('proto/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy lints
        run: cargo clippy --all-targets -- -D warnings

      - name: Build all binaries
        run: cargo build --all-targets

      - name: Run tests
        run: cargo test --lib --verbose

  # ── Elixir: relay tests ───────────────────────────────────────
  relay:
    name: Elixir (relay)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps + build
        uses: actions/cache@v5
        with:
          path: |
            relay/deps
            relay/_build
          key: relay-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('relay/mix.exs') }}
          restore-keys: relay-${{ runner.os }}-

      - name: Get dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test --trace

  # ── Elixir: NS tests ─────────────────────────────────────────
  ns:
    name: Elixir (ns)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ns
    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps + build
        uses: actions/cache@v5
        with:
          path: |
            ns/deps
            ns/_build
          key: ns-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('ns/mix.exs') }}
          restore-keys: ns-${{ runner.os }}-

      - name: Get dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test --trace

  # ── Elixir: gateway tests ─────────────────────────────────────
  gateway:
    name: Elixir (gateway)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps + build
        uses: actions/cache@v5
        with:
          path: |
            gateway/deps
            gateway/_build
            ns/deps
            ns/_build
          key: gateway-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('gateway/mix.exs', 'ns/mix.exs') }}
          restore-keys: gateway-${{ runner.os }}-

      - name: Get dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test --trace

  # ── Cross-language interop tests ──────────────────────────────
  interop:
    name: Interop (Rust ↔ Elixir)
    runs-on: ubuntu-latest
    needs: [rust, relay, ns, gateway]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            proto/target/
          key: cargo-interop-${{ runner.os }}-${{ hashFiles('proto/Cargo.lock') }}
          restore-keys: cargo-interop-${{ runner.os }}-

      - name: Cache Elixir deps
        uses: actions/cache@v5
        with:
          path: |
            relay/deps
            relay/_build
            ns/deps
            ns/_build
            gateway/deps
            gateway/_build
          key: elixir-interop-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('relay/mix.exs', 'ns/mix.exs', 'gateway/mix.exs') }}
          restore-keys: elixir-interop-${{ runner.os }}-

      - name: Compile Elixir projects
        run: |
          cd relay && mix deps.get && mix compile && cd ..
          cd ns && mix deps.get && mix compile && cd ..
          cd gateway && mix deps.get && mix compile && cd ..

      - name: Compile Rust binaries
        working-directory: proto
        run: cargo build --all-targets

      - name: Run full interop suite
        run: bash interop/run_full_test.sh

  # ── Performance regression gate ─────────────────────────────
  perf-gate:
    name: Performance Gate
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            proto/target/
          key: cargo-perf-${{ runner.os }}-${{ hashFiles('proto/Cargo.lock') }}
          restore-keys: cargo-perf-${{ runner.os }}-

      - name: Run performance gate
        run: bash bench/perf-gate.sh --output bench/perf-results.json --verbose

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-results-${{ github.sha }}
          path: |
            bench/perf-results.json
            bench/latest-perf-gate.json
          retention-days: 90

  # ── Summary gate ──────────────────────────────────────────────
  ci-pass:
    name: CI ✅
    if: always()
    needs: [rust, relay, ns, gateway, interop, perf-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "❌ One or more jobs failed"
            exit 1
          fi
          echo "✅ All jobs passed"
