# ─────────────────────────────────────────────────────────────
# ZTLP Gateway Access Policy — Vaultwarden
# ─────────────────────────────────────────────────────────────
#
# Default: deny all. Only identities in the listed groups can
# access the password manager through the ZTLP gateway.
#
# Access is via ZTLP/UDP — the gateway extracts cryptographic
# identity from the Noise_XX tunnel session and checks it
# against the allow list below.

default = "deny"

[[services]]
name = "vault"
allow = [
  "family@home.ztlp",
  "team@home.ztlp",
]
auth_mode = "identity"       # inject X-ZTLP-* identity headers into backend requests
min_assurance = "software"   # any enrolled device accepted (software key or better)

# ── Stricter assurance (optional) ─────────────────────────
# Require hardware-backed keys (Secure Enclave, YubiKey, TPM)
# for all vault access. Rejects devices with software-only keys.
#
# [[services]]
# name = "vault"
# allow = [
#   "family@home.ztlp",
#   "team@home.ztlp",
# ]
# auth_mode = "identity"
# min_assurance = "hardware"   # only hardware-backed keys accepted
